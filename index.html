<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startseite - KDStV Nordmark</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-container">
        <div class="logo-section">
            <a href="index.html"><img src="images/Wappen.svg" alt="Wappen KDStV Nordmark" style="height: 40px;"></a>
            <span class="site-title">KDStV Nordmark</span>
        </div>

        <nav>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html" class="nav-link-active">Startseite</a></li>
                <li><a href="ueber-nordmark.html">Über Nordmark</a></li>
                <li><a href="semesterprogramm.html">Semesterprogramm</a></li>
                <li><a href="social-media.html">Social Media</a></li>
                <li><a href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>

        <button class="hamburger" id="hamburger" aria-label="Navigation umschalten">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>
</header>

<!-- BREADCRUMB -->
<div class="breadcrumb-bar visible" id="breadcrumb">Startseite</div>

<!-- MAIN CONTENT -->
<main>
    <!-- HERO SECTION -->
    <div class="hero hero-with-bg">
        <div class="hero-buttons">
            <a href="ueber-nordmark.html" class="button button-transparent button-dark-red">Über Nordmark</a>
            <a href="semesterprogramm.html" class="button button-transparent button-black">Semesterprogramm</a>
        </div>
    </div>
</main>

<footer>
    <p>&copy; 2025 KDStV Nordmark zu Essen</p>
</footer>

<script>
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('nav-menu');

    hamburger.addEventListener('click', () => {
        navMenu.classList.toggle('open');
    });

    // Menü schließen wenn Link geklickt wird
    navMenu.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') {
            navMenu.classList.remove('open');
        }
    });
</script>

</body>
</html>
